name: Update Disney Wait Time Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore SQLite database cache
        uses: actions/cache/restore@v4
        with:
          path: data/disney_wait_times.db
          key: disney-wait-db-${{ github.run_id }}
          restore-keys: |
            disney-wait-db-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create database if missing
        run: |
          mkdir -p data
          if [ ! -f data/disney_wait_times.db ]; then
            sqlite3 data/disney_wait_times.db < sql/schema.sql
            python scripts/seed_parks.py
            python scripts/import_rides.py
            python scripts/import_attraction_scores.py
          fi

      - name: Collect latest wait times
        run: |
          python scripts/collect_current_waits.py

      - name: Save SQLite database cache
        uses: actions/cache/save@v4
        with:
          path: data/disney_wait_times.db
          key: disney-wait-db-${{ github.run_id }}

      - name: Commit updated JSON data to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add dashboard/public/data/*.json

          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "Update Disney wait time data"
            git push
          fi

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: |
          npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm run build

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dashboard/dist
          publish_branch: gh-pages