name: Update Disney Wait Time Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-disney-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary

      - name: Seed Supabase reference data
        run: |
          python scripts/seed_parks.py
          python scripts/import_rides.py
          python scripts/import_attraction_scores.py

      - name: Collect latest wait times and export JSON
        run: |
          python scripts/collect_current_waits.py

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: |
          npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm run build

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dashboard/dist
          publish_branch: gh-pages